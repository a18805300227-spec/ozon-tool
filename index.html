<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ozon 搬家助手 v3</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0c14;--s:#13131e;--c:#1a1a28;--b:#2c2c42;--a:#5b7af5;--a2:#8b5cf6;--g:#10b981;--o:#f59e0b;--r:#ef4444;--t:#e8e8f2;--m:#6b6b8a}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t);min-height:100vh}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 60% 40% at 15% 10%,rgba(91,122,245,.07) 0%,transparent 60%),radial-gradient(ellipse 40% 50% at 85% 85%,rgba(139,92,246,.05) 0%,transparent 60%)}
.wrap{max-width:960px;margin:0 auto;padding:32px 20px 80px;position:relative}

/* Header */
header{text-align:center;margin-bottom:32px}
.logo-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:8px}
.logo{width:42px;height:42px;background:linear-gradient(135deg,var(--a),var(--a2));border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px}
h1{font-family:'Syne',sans-serif;font-size:24px;font-weight:800}
.sub{color:var(--m);font-size:12px;margin-top:5px}

/* Cards */
.card{background:var(--c);border:1px solid var(--b);border-radius:13px;padding:20px;margin-bottom:16px}
.ct{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--m);margin-bottom:14px;display:flex;align-items:center;gap:6px}
.dot{width:5px;height:5px;border-radius:50%;background:var(--a);flex-shrink:0}

/* Forms */
label{font-size:11px;color:var(--m);display:block;margin-bottom:5px;font-weight:500}
input,textarea,select{width:100%;background:var(--s);border:1px solid var(--b);border-radius:8px;padding:10px 13px;color:var(--t);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .2s}
input:focus,textarea:focus,select:focus{border-color:var(--a)}
select option{background:#1a1a28}
textarea{resize:vertical}
.iw{position:relative;margin-bottom:13px}
.eye{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--m);cursor:pointer;font-size:14px}
.has-eye input{padding-right:38px}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 20px;border-radius:8px;border:none;cursor:pointer;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;transition:all .2s;letter-spacing:.3px}
.btn-p{background:linear-gradient(135deg,var(--a),var(--a2));color:#fff;width:100%;box-shadow:0 4px 16px rgba(91,122,245,.28)}
.btn-p:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(91,122,245,.38)}
.btn-p:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-o{background:none;border:1px solid var(--b);color:var(--m);font-family:'DM Sans',sans-serif;font-weight:500;font-size:11px}
.btn-o:hover{border-color:var(--a);color:var(--a)}
.btn-g{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:var(--g);font-family:'DM Sans',sans-serif;font-weight:600;font-size:11px}
.btn-g:hover{background:rgba(16,185,129,.22)}
.btn-cp{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);color:var(--g);padding:4px 11px;border-radius:5px;font-size:10px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s}
.btn-cp:hover{background:rgba(16,185,129,.2)}.btn-cp.ok{background:rgba(16,185,129,.25)}

/* Alerts */
.hint{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:8px;padding:12px 14px;margin-bottom:13px;font-size:11px;color:#c49a3c;line-height:1.7}
.hint a{color:var(--o)}.hint strong{color:#e0b050}
.err{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:10px 13px;font-size:11px;color:#f87171;line-height:1.6;display:none;margin-bottom:12px}
.err.show{display:block}

/* Two columns */
.cols2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:640px){.cols2{grid-template-columns:1fr}}

/* Image slots grid */
.img-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.img-slot{background:var(--s);border:2px solid var(--b);border-radius:10px;aspect-ratio:3/4;position:relative;overflow:hidden;cursor:pointer;transition:all .2s}
.img-slot:hover{border-color:var(--a)}
.img-slot img{width:100%;height:100%;object-fit:cover;display:block}
.img-slot .slot-label{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.85));padding:8px 10px 8px;font-size:10px;font-family:'Syne',sans-serif;font-weight:700;color:#fff;letter-spacing:.4px}
.img-slot .slot-dl{position:absolute;top:6px;right:6px;background:rgba(16,185,129,.85);border:none;border-radius:5px;color:#fff;font-size:10px;padding:3px 8px;cursor:pointer;display:none;font-family:'DM Sans',sans-serif;font-weight:600}
.img-slot:hover .slot-dl{display:block}
.img-slot .slot-loading{position:absolute;inset:0;background:rgba(10,10,20,.8);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;font-size:11px;color:var(--a)}
.img-slot .slot-err{position:absolute;inset:0;background:rgba(30,10,10,.8);display:flex;align-items:center;justify-content:center;font-size:10px;color:#f87171;padding:10px;text-align:center}
.spinner{width:28px;height:28px;border:3px solid rgba(91,122,245,.2);border-top-color:var(--a);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Input image area */
.src-img-wrap{background:var(--s);border:2px dashed var(--b);border-radius:10px;min-height:120px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color .2s;position:relative;overflow:hidden;margin-bottom:13px}
.src-img-wrap:hover{border-color:var(--a)}
.src-img-wrap img{width:100%;height:200px;object-fit:contain;display:block}
.src-img-wrap .ph{color:var(--m);font-size:12px;text-align:center;padding:20px;line-height:1.6}
.src-img-wrap .rm{position:absolute;top:6px;right:6px;background:rgba(239,68,68,.8);border:none;border-radius:5px;color:#fff;font-size:11px;padding:3px 8px;cursor:pointer}

/* Style pills */
.style-pills{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:13px}
.pill{padding:6px 13px;border-radius:7px;font-size:11px;border:1px solid var(--b);cursor:pointer;transition:all .2s;color:var(--m);background:var(--s);font-family:'DM Sans',sans-serif;font-weight:500}
.pill:hover{border-color:var(--a);color:var(--a)}
.pill.on{background:rgba(91,122,245,.15);border-color:var(--a);color:var(--a)}

/* Progress */
.pw{display:none;margin:14px 0}.pw.show{display:block}
.pb{height:3px;background:var(--b);border-radius:2px;overflow:hidden;margin-bottom:10px}
.pf{height:100%;width:0%;background:linear-gradient(90deg,var(--a),var(--a2));border-radius:2px;transition:width .35s ease}
.ps{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--m);padding:4px 0;border-bottom:1px solid var(--b)}
.ps:last-child{border-bottom:none}.ps.run{color:var(--a)}.ps.ok{color:var(--g)}.ps.fail{color:var(--r)}
.spin-s{animation:spin .8s linear infinite;display:inline-block}

/* Results - copy blocks */
.rb{background:var(--s);border:1px solid var(--b);border-radius:9px;padding:13px;margin-bottom:10px;transition:border-color .2s}
.rb:hover{border-color:rgba(91,122,245,.3)}
.rh{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.rl{font-size:10px;font-family:'Syne',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--m)}
.rt{font-size:12px;line-height:1.7;color:var(--t);white-space:pre-wrap;word-break:break-word}
.cc{font-size:10px;color:var(--m);margin-top:4px}
.tw{display:flex;flex-wrap:wrap;gap:5px}
.tag{background:rgba(91,122,245,.1);border:1px solid rgba(91,122,245,.25);color:#8fa8f7;padding:2px 9px;border-radius:10px;font-size:10px;cursor:pointer}
.tag:hover{background:rgba(91,122,245,.2)}
.cat-p{display:inline-flex;align-items:center;gap:4px;background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.25);color:#b08af0;padding:5px 11px;border-radius:6px;font-size:11px}
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="logo-row"><div class="logo">🛒</div><h1>Ozon 搬家助手 v3</h1></div>
  <p class="sub">上传商品图 → AI 重新生成俄罗斯风格主图 + 上架文案 · 基于 allapi.store</p>
</header>

<!-- API Key -->
<div class="card" id="ckey">
  <div class="ct"><span class="dot"></span>API Key 配置</div>
  <div class="hint">
    填入你的 <strong>allapi.store API Key</strong>，Key 只存在你的浏览器本地。<br>
    没有Key？打开 <a href="https://allapi.store" target="_blank">allapi.store</a> 注册充值后获取。
  </div>
  <div class="iw has-eye">
    <label>allapi.store API Key</label>
    <input type="password" id="apikey" placeholder="sk-...">
    <button class="eye" onclick="toggleEye()">👁</button>
  </div>
  <div class="cols2" style="margin-bottom:13px">
    <div class="iw" style="margin-bottom:0">
      <label>生图模型</label>
      <select id="imgModel">
        <option value="gemini-3.1-flash-image-preview">⚡ Gemini 3.1 Flash 生图（推荐·$0.099）</option>
        <option value="gemini-3-pro-image-preview">👑 Gemini 3 Pro 生图（最强·$0.198）</option>
        <option value="gemini-2.5-flash-image">🔵 Gemini 2.5 Flash 生图（$0.150）</option>
        <option value="gpt-image-1.5-all">🧠 GPT Image 1.5 All（$0.078）</option>
        <option value="sora_image">🌌 Sora 引擎（$0.030）</option>
        <option value="gpt-4o-image-vip">💎 GPT-4o Image VIP（$0.120）</option>
      </select>
    </div>
    <div class="iw" style="margin-bottom:0">
      <label>文案模型</label>
      <select id="seoModel">
        <option value="gemini-3-pro-preview">👑 Gemini 3 Pro 文案（最强）</option>
        <option value="gemini-3-flash-preview" selected>⚡ Gemini 3 Flash 文案（推荐）</option>
        <option value="gpt-4o">🧠 GPT-4o</option>
        <option value="qwen3.5-plus-2026-02-15">🐼 Qwen 3.5 俄语特化</option>
      </select>
    </div>
  </div>
  <button class="btn btn-p" onclick="saveKey()">保存配置 →</button>
  <div id="keyOk" style="display:none;margin-top:10px;font-size:11px;color:var(--g)">✅ 已保存</div>
</div>

<!-- Input -->
<div class="card">
  <div class="ct"><span class="dot"></span>商品信息</div>

  <!-- Source image -->
  <label>商品原图（点击上传 或 粘贴图片链接）</label>
  <div class="src-img-wrap" id="srcWrap" onclick="document.getElementById('srcFile').click()">
    <div class="ph" id="srcPh">📷 点击上传商品图<br><span style="font-size:10px;color:var(--m)">支持 JPG / PNG，AI 将基于此图重新生成</span></div>
  </div>
  <input type="file" id="srcFile" accept="image/*" style="display:none" onchange="onFileSelect(this)">

  <div class="iw">
    <label>或粘贴图片URL</label>
    <input type="text" id="imgUrl" placeholder="https://...jpg" oninput="onUrlInput(this.value)">
  </div>

  <div class="iw">
    <label>中文标题 / 产品名称 <span style="color:var(--r)">*</span></label>
    <input type="text" id="ztitle" placeholder="例：骑行尾灯 USB充电 IPX6防水 300流明">
  </div>

  <div class="iw">
    <label>卖点 / 功能描述</label>
    <textarea id="feats" rows="3" placeholder="例：300流明超亮&#10;IPX6防水，续航8小时&#10;USB-C快充，3种闪烁模式"></textarea>
  </div>

  <!-- Style selector -->
  <label style="margin-bottom:8px">生成图片风格（可多选）</label>
  <div class="style-pills" id="stylePills">
    <span class="pill on" data-style="main">主图 3:4</span>
    <span class="pill" data-style="detail">产品展示图</span>
    <span class="pill" data-style="life">生活场景副图</span>
    <span class="pill" data-style="spec">卖点特写图</span>
  </div>

  <div id="ierr" class="err"></div>
  <button class="btn btn-p" id="genBtn" onclick="go()">✨ AI 重新生图 + 生成俄语文案</button>
</div>

<!-- Progress -->
<div class="pw" id="pw"><div class="pb"><div class="pf" id="pf"></div></div><div id="psteps"></div></div>

<!-- Results -->
<div id="res" style="display:none">

  <!-- Generated images grid -->
  <div class="card">
    <div class="ct" style="justify-content:space-between;margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:6px"><span class="dot"></span>AI 生成主图</div>
      <button class="btn-cp" onclick="dlAll()">⬇ 下载全部</button>
    </div>
    <div class="img-grid" id="imgGrid"></div>
    <button class="btn btn-o" style="width:100%;margin-top:4px" onclick="regenImgs()">🎲 重新生成所有图片</button>
  </div>

  <!-- Copy content -->
  <div class="card">
    <div class="ct"><span class="dot"></span>俄语上架文案</div>
    <div class="rb">
      <div class="rh"><div class="rl">📂 Ozon 类目</div><button class="btn-cp" onclick="cp('catv',this)">复制</button></div>
      <span class="cat-p">📁 <span id="catv">—</span></span>
    </div>
    <div class="rb">
      <div class="rh"><div class="rl">🇷🇺 俄语标题</div><button class="btn-cp" onclick="cp('rtit',this)">复制</button></div>
      <div class="rt" id="rtit">—</div>
      <div class="cc" id="rlen"></div>
    </div>
    <div class="rb">
      <div class="rh"><div class="rl">🇷🇺 俄语描述</div><button class="btn-cp" onclick="cp('rdesc',this)">复制</button></div>
      <div class="rt" id="rdesc">—</div>
    </div>
    <div class="rb">
      <div class="rh"><div class="rl">🏷️ 搜索标签 (20个)</div><button class="btn-cp" onclick="cp('rtags',this)">复制</button></div>
      <div class="rt" id="rtags" style="font-size:11px;color:#8fa8f7">—</div>
    </div>
    <div class="rb">
      <div class="rh"><div class="rl">📝 原始中文标题</div><button class="btn-cp" onclick="cp('zref',this)">复制</button></div>
      <div class="rt" id="zref" style="color:var(--m);font-size:11px">—</div>
    </div>
  </div>

  <div style="text-align:center;margin-top:8px">
    <button class="btn btn-o" onclick="reset()" style="padding:10px 28px">🔄 处理下一个商品</button>
  </div>
</div>

</div>
<script>
// ─── Constants ────────────────────────────────────────────────
const API = 'https://allapi.store';

const STYLE_PROMPTS = {
  main:   (title, feats) => `电商产品主图，面向俄罗斯Ozon平台买家，俄语排版。主体居中占画面80%。画面顶部带有醒目3D渲染粗体俄语主标题，高跳跃率亮色字体（橙色或红色高对比度）。产品下方有"产品名称+核心特性"的半透明圆角矩形俄文UI文本框。卖点文字: "${feats}"。专业影棚级布光，45度侧主光与强烈轮廓光。背景极简微纹理风格。8K分辨率，商业广告级画质。产品: ${title}。--ar 3:4`,
  detail: (title, feats) => `面向俄罗斯Ozon买家，俄语排版。专业高级产品陈列摄影，45度等距视角，产品置于极简几何展台。商业杂志排版风格，带有精致俄语参数文案，字体大小粗细对比强烈，主推卖点俄文亮色强调。柔和漫反射光线与深邃体积阴影。卖点: "${feats}"。产品: ${title}。8K分辨率。--ar 3:4`,
  life:   (title, feats) => `面向俄罗斯Ozon买家，俄语排版。高级商业生活方式摄影，产品自然融入俄罗斯风格家居环境，为绝对视觉焦点。画面虚化区域融入呼吸感极强的俄语营销文案，带优雅主副标题。电影级光影构图。卖点: "${feats}"。产品: ${title}。8K分辨率。--ar 3:4`,
  spec:   (title, feats) => `面向俄罗斯Ozon买家，俄语排版。极致微距特写摄影，聚焦产品核心工艺细节。侧边留白处有俄语简洁无衬线文案，发光指示线连接文案与细节。文字置于磨砂玻璃质感圆角矩形底框内，信息层级分明。卖点: "${feats}"。产品: ${title}。8K分辨率。--ar 3:4`
};

const STYLE_LABELS = { main:'主图', detail:'展示图', life:'生活副图', spec:'卖点图' };

const SEO_PROMPT = `# Role
你是拥有10年经验的俄罗斯Ozon资深运营专家，精通SEO搜索排名规则。

# Task
根据商品信息，生成完整的Ozon上架内容。

# Rules
## 标题
- 逻辑：核心大词 + 精准长尾词 + 核心属性
- 限制：< 200字符

## 搜索标签
- 数量：恰好20个
- 格式：带#号，空格分隔，单个不超过29字符

## 产品描述
- 格式整洁，多用数字，适当加表情符号
- 字数 > 200字
- 专业电商风格

# 输出格式
严格只返回JSON，不要任何其他文字：
{"title":"俄语标题","tags":"#标签1 #标签2...共20个","description":"俄语描述","category":"Ozon三级类目(俄语)","categoryZh":"Ozon三级类目(中文)"}`;

let apiKey='', imgModelId='gemini-3.1-flash-image-preview', seoModelId='gemini-3-flash-preview';
let srcB64='', srcMime='image/jpeg', srcUrlVal='';
let selectedStyles=['main'];
let lastProduct=null, lastRu=null, generatedSlots=[];

// ─── Init ─────────────────────────────────────────────────────
window.onload = () => {
  apiKey = localStorage.getItem('oz_apikey') || '';
  if (apiKey) {
    document.getElementById('apikey').value = apiKey;
    document.getElementById('keyOk').style.display = 'block';
  }
  // Style pill toggle
  document.querySelectorAll('.pill').forEach(p => {
    p.onclick = () => {
      p.classList.toggle('on');
      selectedStyles = [...document.querySelectorAll('.pill.on')].map(x => x.dataset.style);
    };
  });
};

function toggleEye() { const i=document.getElementById('apikey'); i.type=i.type==='password'?'text':'password'; }

function saveKey() {
  const k = document.getElementById('apikey').value.trim();
  const m = document.getElementById('imgModel').value;
  const s = document.getElementById('seoModel').value;
  if (!k) { alert('请输入 API Key'); return; }
  apiKey = k; imgModelId = m; seoModelId = s;
  localStorage.setItem('oz_apikey', k);
  document.getElementById('keyOk').style.display = 'block';
}

// ─── Image input ──────────────────────────────────────────────
function onFileSelect(inp) {
  const file = inp.files[0]; if (!file) return;
  srcMime = file.type || 'image/jpeg';
  const reader = new FileReader();
  reader.onload = e => {
    srcB64 = e.target.result.split(',')[1];
    showSrcPreview(e.target.result);
  };
  reader.readAsDataURL(file);
}

function onUrlInput(url) {
  srcUrlVal = url.trim();
  if (url.match(/\.(jpg|jpeg|png|webp)/i)) {
    showSrcPreview(url);
  }
}

function showSrcPreview(src) {
  const wrap = document.getElementById('srcWrap');
  document.getElementById('srcPh').style.display = 'none';
  let img = wrap.querySelector('img');
  if (!img) { img = document.createElement('img'); wrap.appendChild(img); }
  img.src = src;
  let rm = wrap.querySelector('.rm');
  if (!rm) {
    rm = document.createElement('button'); rm.className = 'rm'; rm.textContent = '✕';
    rm.onclick = e => { e.stopPropagation(); clearSrc(); };
    wrap.appendChild(rm);
  }
}

function clearSrc() {
  srcB64 = ''; srcUrlVal = '';
  const wrap = document.getElementById('srcWrap');
  const img = wrap.querySelector('img'); if (img) img.remove();
  const rm = wrap.querySelector('.rm'); if (rm) rm.remove();
  document.getElementById('srcPh').style.display = 'block';
  document.getElementById('imgUrl').value = '';
  document.getElementById('srcFile').value = '';
}

// ─── Convert URL to base64 ────────────────────────────────────
async function urlToB64(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`图片抓取失败 HTTP ${r.status}`);
  const blob = await r.blob();
  srcMime = blob.type || 'image/jpeg';
  return new Promise(res => {
    const fr = new FileReader();
    fr.onloadend = () => res(fr.result.split(',')[1]);
    fr.readAsDataURL(blob);
  });
}

// ─── Main flow ────────────────────────────────────────────────
async function go() {
  const title = document.getElementById('ztitle').value.trim();
  const feats = document.getElementById('feats').value.trim();
  const ee = document.getElementById('ierr');
  he(ee);

  if (!apiKey) { se(ee, '请先填写并保存 API Key'); return; }
  if (!title)  { se(ee, '请填写中文标题（必填）'); return; }
  if (!selectedStyles.length) { se(ee, '请至少选择一种图片风格'); return; }

  // Resolve image
  let b64 = srcB64, mime = srcMime;
  if (!b64 && srcUrlVal) {
    try { b64 = await urlToB64(srcUrlVal); mime = srcMime; }
    catch(e) { se(ee, '图片URL加载失败：'+e.message); return; }
  }
  if (!b64) { se(ee, '请上传商品图片或填写图片URL'); return; }

  document.getElementById('genBtn').disabled = true;
  document.getElementById('res').style.display = 'none';
  const pw = document.getElementById('pw'); pw.classList.add('show');
  document.getElementById('psteps').innerHTML = ''; fill(5);

  lastProduct = { title, feats, b64, mime };

  try {
    // Step 1: SEO copy
    ap('seo', 'AI 生成俄语上架文案…', 'run'); fill(10);
    const ru = await genSeo(title, feats, b64, mime);
    lastRu = ru;
    up('seo', '✅ 俄语文案生成完成', 'ok'); fill(30);

    // Step 2: Images (parallel)
    ap('img', `生成 ${selectedStyles.length} 张 AI 主图…`, 'run'); fill(35);
    initImageGrid(selectedStyles);
    const results = await Promise.allSettled(
      selectedStyles.map((style, i) => genOneImage(style, title, feats, b64, mime, ru, i))
    );
    const successCount = results.filter(r => r.status === 'fulfilled').length;
    up('img', `✅ 完成 ${successCount}/${selectedStyles.length} 张`, 'ok'); fill(100);

    showCopy(ru);
    setTimeout(() => { pw.classList.remove('show'); document.getElementById('res').style.display='block'; document.getElementById('res').scrollIntoView({behavior:'smooth'}); }, 400);

  } catch(e) {
    up('seo', '❌ '+e.message, 'fail');
    se(ee, '生成失败：'+e.message);
    document.getElementById('genBtn').disabled = false;
  }
}

// ─── SEO generation ───────────────────────────────────────────
async function genSeo(title, feats, b64, mime) {
  const userPrompt = `商品中文标题：${title}\n卖点：${feats||'无'}\n\n请生成完整的Ozon俄语上架内容。`;
  const messages = [{
    role: 'user',
    content: [
      { type: 'text', text: SEO_PROMPT + '\n\n' + userPrompt },
      { type: 'image_url', image_url: { url: `data:${mime};base64,${b64}` } }
    ]
  }];
  const text = await callText(seoModelId, messages);
  const m = text.match(/\{[\s\S]*\}/);
  if (!m) throw new Error('文案AI返回格式异常，请重试');
  return JSON.parse(m[0]);
}

// ─── Image generation ─────────────────────────────────────────
function initImageGrid(styles) {
  generatedSlots = [];
  const grid = document.getElementById('imgGrid');
  grid.innerHTML = '';
  // Make grid single column if only 1 style
  grid.style.gridTemplateColumns = styles.length === 1 ? '1fr' : '1fr 1fr';
  styles.forEach((style, i) => {
    const slot = document.createElement('div');
    slot.className = 'img-slot';
    slot.id = `slot_${i}`;
    slot.innerHTML = `<div class="slot-loading"><div class="spinner"></div><span>${STYLE_LABELS[style]}</span></div>`;
    grid.appendChild(slot);
    generatedSlots.push({ style, url: null });
  });
}

async function genOneImage(style, title, feats, b64, mime, ru, idx) {
  const slot = document.getElementById(`slot_${idx}`);
  const prompt = STYLE_PROMPTS[style](
    ru?.title ? ru.title.slice(0, 40) : title,
    feats.slice(0, 80)
  );

  try {
    const url = await callImage(imgModelId, prompt, b64, mime);
    generatedSlots[idx].url = url;
    slot.innerHTML = `
      <img src="${url}" onerror="this.parentElement.querySelector('.slot-err') && null">
      <div class="slot-label">${STYLE_LABELS[style]}</div>
      <button class="slot-dl" onclick="dlOne('${url}','${style}')">⬇ 下载</button>`;
  } catch(e) {
    slot.innerHTML = `<div class="slot-err">❌ ${STYLE_LABELS[style]}<br>${e.message.slice(0,60)}</div>`;
    throw e;
  }
}

// ─── API calls ────────────────────────────────────────────────
async function callText(model, messages) {
  // allapi.store uses unified OpenAI-compatible endpoint for all models
  const url = `${API}/v1/chat/completions`;
  const body = { model, messages };

  const r = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + apiKey },
    body: JSON.stringify(body)
  });
  if (!r.ok) {
    const e = await r.json().catch(() => ({}));
    throw new Error(e.error?.message || `文案API错误 (${r.status})`);
  }
  const d = await r.json();
  if (d.error) throw new Error(d.error.message || JSON.stringify(d.error));
  return d.choices?.[0]?.message?.content || '';
}

async function callImage(model, prompt, b64, mime) {
  // Gemini native image generation
  if (model.toLowerCase().includes('gemini')) {
    const url = `${API}/v1beta/models/${model}:generateContent`;
    const body = {
      contents: [{ role: 'user', parts: [
        { text: prompt },
        { inlineData: { mimeType: mime, data: b64 } }
      ]}],
      safetySettings: [
        { category: 'HARM_CATEGORY_HARASSMENT', threshold: 'BLOCK_NONE' },
        { category: 'HARM_CATEGORY_HATE_SPEECH', threshold: 'BLOCK_NONE' },
        { category: 'HARM_CATEGORY_SEXUALLY_EXPLICIT', threshold: 'BLOCK_NONE' },
        { category: 'HARM_CATEGORY_DANGEROUS_CONTENT', threshold: 'BLOCK_NONE' }
      ]
    };
    const r = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + apiKey },
      body: JSON.stringify(body)
    });
    if (!r.ok) throw new Error(`生图API错误 (${r.status}): ${await r.text().then(t=>t.slice(0,100))}`);
    const d = await r.json();
    const parts = d.candidates?.[0]?.content?.parts || [];
    const imgPart = parts.find(p => p.inlineData);
    if (imgPart) return `data:${imgPart.inlineData.mimeType};base64,${imgPart.inlineData.data}`;
    // If text response (no image), fallback
    const txt = parts.map(p => p.text||'').join('');
    const urlMatch = txt.match(/https?:\/\/[^\s)]+\.(png|jpg|jpeg|webp)/i);
    if (urlMatch) return urlMatch[0];
    throw new Error('模型返回了文字而非图片，请换用支持生图的模型');
  }

  // Flux via Replicate
  if (model === 'flux.1.1-pro') {
    const createR = await fetch(`${API}/replicate/v1/models/black-forest-labs/flux-kontext-dev/predictions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + apiKey },
      body: JSON.stringify({ input: { prompt, input_image: `data:${mime};base64,${b64}`, output_format: 'jpg', output_quality: 90 } })
    });
    if (!createR.ok) throw new Error(`Flux 创建失败 (${createR.status})`);
    const job = await createR.json();
    if (job.error) throw new Error(job.error);
    for (let i = 0; i < 40; i++) {
      await sleep(3500);
      const poll = await fetch(`${API}/replicate/v1/predictions/${job.id}`, { headers: { Authorization: 'Bearer ' + apiKey } });
      const st = await poll.json();
      if (st.status === 'succeeded') return Array.isArray(st.output) ? st.output[0] : st.output;
      if (st.status === 'failed') throw new Error('Flux 渲染失败: ' + (st.error || '未知'));
    }
    throw new Error('Flux 超时（等待超过140秒）');
  }

  // GPT / Sora via chat completions
  const r = await fetch(`${API}/v1/chat/completions`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + apiKey },
    body: JSON.stringify({ model, messages: [{ role: 'user', content: [
      { type: 'text', text: prompt },
      { type: 'image_url', image_url: { url: `data:${mime};base64,${b64}` } }
    ]}]})
  });
  if (!r.ok) throw new Error(`生图API错误 (${r.status})`);
  const d = await r.json();
  const content = d.choices?.[0]?.message?.content || '';
  const m = content.match(/https?:\/\/[^\s)]+\.(png|jpg|jpeg|webp)/i) || content.match(/https?:\/\/[^\s)]+/);
  if (m) return m[0];
  throw new Error('未从响应中提取到图片URL');
}

// ─── Show copy results ────────────────────────────────────────
function showCopy(ru) {
  document.getElementById('catv').textContent = ru.categoryZh ? `${ru.category}（${ru.categoryZh}）` : (ru.category || '—');
  const t = ru.title || '—';
  document.getElementById('rtit').textContent = t;
  document.getElementById('rlen').textContent = `字符数：${t.length}/200 ${t.length>200?'⚠️超出':'✅'}`;
  document.getElementById('rdesc').textContent = ru.description || '—';
  document.getElementById('rtags').textContent = ru.tags || '—';
  document.getElementById('zref').textContent = lastProduct?.title || '—';
  document.getElementById('genBtn').disabled = false;
}

// ─── Download ─────────────────────────────────────────────────
function dlOne(url, style) {
  const a = document.createElement('a');
  a.href = url; a.download = `ozon_${style}.png`; a.click();
}
function dlAll() {
  generatedSlots.forEach((s, i) => {
    if (s.url) setTimeout(() => dlOne(s.url, s.style), i * 400);
  });
}

// ─── Regen ────────────────────────────────────────────────────
async function regenImgs() {
  if (!lastProduct) return;
  initImageGrid(selectedStyles);
  await Promise.allSettled(
    selectedStyles.map((style, i) => genOneImage(style, lastProduct.title, lastProduct.feats, lastProduct.b64, lastProduct.mime, lastRu, i))
  );
}

// ─── Copy helpers ─────────────────────────────────────────────
function cp(id, btn) {
  navigator.clipboard.writeText(document.getElementById(id).textContent||'').then(() => {
    const o=btn.textContent; btn.textContent='✅'; btn.classList.add('ok');
    setTimeout(()=>{ btn.textContent=o; btn.classList.remove('ok'); }, 1800);
  });
}

// ─── Progress ─────────────────────────────────────────────────
function ap(id,t,c){const d=document.createElement('div');d.id='ps_'+id;d.className='ps '+(c||'');d.innerHTML=(c==='run'?'<span class="spin-s">⟳</span> ':'')+t;document.getElementById('psteps').appendChild(d);}
function up(id,t,c){const e=document.getElementById('ps_'+id);if(!e)return;e.className='ps '+c;e.innerHTML=t;}
function fill(p){document.getElementById('pf').style.width=p+'%';}
function se(el,m){el.textContent=m;el.classList.add('show');}
function he(el){el.classList.remove('show');}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

// ─── Reset ────────────────────────────────────────────────────
function reset() {
  clearSrc();
  ['ztitle','feats'].forEach(id => document.getElementById(id).value='');
  document.getElementById('res').style.display='none';
  document.getElementById('pw').classList.remove('show');
  document.getElementById('psteps').innerHTML='';
  document.getElementById('genBtn').disabled=false;
  fill(0); window.scrollTo({top:0,behavior:'smooth'});
}
